<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Diario Sportivo di Igor</title>
  <meta name="description" content="PWA personale per registrare attività sportive, statistiche e log." />
  <meta name="theme-color" content="#0d6b6f" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#080c12"  media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Diario Sportivo" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./assets/css/main.css" />
</head>
<body>

<div class="app-shell">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-logo">
      <div class="header-logo-icon">DS</div>
      <span id="header-title">Diario Sportivo</span>
    </div>
    <div class="header-right">
      <span class="header-date" id="header-date"></span>
    </div>
  </header>

  <!-- VIEWS -->
  <main>

    <!-- HOME -->
    <section id="view-home" class="view active">
      <div class="empty-state" style="padding-top:60px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <p>Caricamento…</p>
      </div>
    </section>

    <!-- REGISTRA -->
    <section id="view-register" class="view">
      <div class="empty-state" style="padding-top:60px">
        <p>Caricamento…</p>
      </div>
    </section>

    <!-- STATISTICHE -->
    <section id="view-stats" class="view">
      <div class="empty-state" style="padding-top:60px">
        <p>Caricamento…</p>
      </div>
    </section>

    <!-- LOG -->
    <section id="view-log" class="view">
      <div class="empty-state" style="padding-top:60px">
        <p>Caricamento…</p>
      </div>
    </section>

    <!-- IMPOSTAZIONI -->
    <section id="view-settings" class="view">
      <div class="empty-state" style="padding-top:60px">
        <p>Caricamento…</p>
      </div>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">

    <button class="nav-btn active" data-view="home">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span>Home</span>
    </button>

    <button class="nav-btn" data-view="register">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </div>
      <span>Registra</span>
    </button>

    <button class="nav-btn" data-view="stats">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </div>
      <span>Stats</span>
    </button>

    <button class="nav-btn" data-view="log">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      </div>
      <span>Log</span>
    </button>

    <button class="nav-btn" data-view="settings">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </div>
      <span>Impostazioni</span>
    </button>

  </nav>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- App JS (ES modules) -->
<script type="module" src="./assets/js/app.js"></script>

</body>
</html>
